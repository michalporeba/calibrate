<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Calibrate</title>
    <meta
      name="description"
      content="Calibrate is a local-first web application for structured assessments and reflective practice."
    />
    <script type="text/javascript">
      (function restoreGitHubPagesRoute(location) {
        if (!location.search.startsWith("?/")) {
          return;
        }

        const decoded = location.search
          .slice(1)
          .split("&")
          .map((segment) => segment.replace(/~and~/g, "&"))
          .join("?");
        const nextUrl = location.pathname.replace(/\/$/, "") + decoded + location.hash;

        window.history.replaceState(null, "", nextUrl);
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
