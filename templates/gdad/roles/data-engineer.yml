id: data-engineer
label: Data Engineer
families:
  - data
  - engineering
summary: >
  Builds, improves, and operates data pipelines and platforms that support
  reliable analytical and operational use of data.
description: >
  Data Engineers work across data and engineering concerns. They shape data
  movement, quality, and platform capability while balancing delivery,
  operability, and maintainability.
