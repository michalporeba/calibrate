id: gdad
name: GDaD capability self-assessment
summary: >
  A stub capability template for structured reflection against a GDaD-style role,
  level, and evidence model.
description: >
  This starter template proves the context-heavy calibration model. It should
  later support role family, role, and level selection before a calibration is
  created.
dimensions:
  role-family:
    label: Role family
    options:
      data:
        label: Data
      design:
        label: Design
  role:
    label: Role
    options:
      data-analyst:
        label: Data Analyst
      interaction-designer:
        label: Interaction Designer
  level:
    label: Level
    options:
      practitioner:
        label: Practitioner
      senior-practitioner:
        label: Senior Practitioner
items:
  capability:
    label: Capability
    prompt: Describe how you currently demonstrate the role capability.
  evidence:
    label: Evidence
    prompt: Record examples that support your judgement.
